<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Test</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        #output {
            margin-top: 20px;
            padding: 10px;
            background: #333;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>Menu Click Test</h1>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="output">Click on menu items and watch console output...</div>

    <script type="module">
        import { CanvasUIMark, Menu } from './canvasuimark.js';

        const canvas = document.getElementById('gameCanvas');
        const ui = new CanvasUIMark(canvas);

        // Create a vertical menu
        const menu = new Menu(
            50, 50,
            [
                { label: 'Item 1', callback: () => { console.log('Item 1 clicked'); document.getElementById('output').innerHTML += '<br>Item 1 clicked'; } },
                { label: 'Item 2', callback: () => { console.log('Item 2 clicked'); document.getElementById('output').innerHTML += '<br>Item 2 clicked'; } },
                { label: 'Item 3', callback: () => { console.log('Item 3 clicked'); document.getElementById('output').innerHTML += '<br>Item 3 clicked'; } },
                { label: 'Item 4', callback: () => { console.log('Item 4 clicked'); document.getElementById('output').innerHTML += '<br>Item 4 clicked'; } }
            ],
            { width: 200, height: 50, gap: 5, orientation: 'vertical' }
        );
        ui.addControl(menu);

        // Game loop
        let lastTime = 0;
        function gameLoop(currentTime) {
            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;
            ui.update(deltaTime);
            ui.render();
            requestAnimationFrame(gameLoop);
        }
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
