<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Debug Test</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        #output {
            margin-top: 20px;
            padding: 10px;
            background: #333;
            border-radius: 4px;
            min-height: 100px;
        }
        canvas {
            border: 1px solid #666;
        }
    </style>
</head>
<body>
    <h1>Menu Debug Test</h1>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="output">
        <strong>Click Log:</strong><br>
        <span id="log">Waiting for clicks...</span>
    </div>

    <script type="module">
        import { CanvasUIMark, Menu } from './canvasuimark.js';

        const canvas = document.getElementById('gameCanvas');
        const ui = new CanvasUIMark(canvas);
        const log = document.getElementById('log');

        function addLog(msg) {
            console.log(msg);
            log.innerHTML += '<br>' + msg;
        }

        // Create a vertical menu
        const menu = new Menu(
            50, 50,
            [
                { label: 'Item 1', callback: () => addLog('✓ Item 1 callback executed') },
                { label: 'Item 2', callback: () => addLog('✓ Item 2 callback executed') },
                { label: 'Item 3', callback: () => addLog('✓ Item 3 callback executed') },
                { label: 'Item 4', callback: () => addLog('✓ Item 4 callback executed') }
            ],
            { width: 200, height: 50, gap: 5, orientation: 'vertical' }
        );
        ui.addControl(menu);

        // Add click debugging
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            addLog(`Canvas clicked at (${Math.round(x)}, ${Math.round(y)})`);
        });

        // Game loop
        let lastTime = 0;
        function gameLoop(currentTime) {
            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;
            ui.update(deltaTime);
            ui.render();
            requestAnimationFrame(gameLoop);
        }
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
